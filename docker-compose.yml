services:
  db:
    image: postgres:latest
    restart: unless-stopped
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dashboard
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - 8080:8080
    depends_on:        # 👈 adicionado por consistência
      db:
        condition: service_healthy

  api:
    image: total-atacado-api:latest
    restart: unless-stopped
    volumes:
      - ./src/:/app/src/
    command: >
      sh -c "
        . .venv/bin/activate &&
        echo 'Aguardando Postgres...';
        python scripts/wait_for_db.py &&
        echo 'Postgres pronto. Iniciando FastAPI...';
        fastapi run src/app/main.py --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s  # 👈 adicionado: dá tempo do FastAPI subir antes de checar
    ports:
      - "8000:8000"
    depends_on:
      db:                  # 👈 agora aguarda o healthcheck do db passar
        condition: service_healthy

  dashboard:
    image: total-atacado-api:latest
    restart: unless-stopped
    volumes:
      - ./src/:/app/src/
    command: >
      sh -c "
        . .venv/bin/activate &&
        echo 'Aguardando Postgres...';
        python scripts/wait_for_db.py &&
        echo 'Postgres pronto. Iniciando Streamlit...';
        streamlit run src/app/dashboard.py --server.port 8501
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]  # 👈 endpoint correto do Streamlit
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "8501:8501"
    depends_on:
      db:                  # 👈 idem
        condition: service_healthy

volumes:
  db_data: